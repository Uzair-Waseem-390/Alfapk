{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-check-circle"></i> Password Changed Successfully</h4>
                </div>
                <div class="card-body text-center">
                    <i class="bi bi-shield-check" style="font-size: 5rem; color: #28a745;"></i>
                    <h5 class="mt-3">Your password has been changed!</h5>
                    <p class="text-muted">You can now use your new password to login.</p>
                    
                    <div class="mt-4">
                        <a href="{% url 'profile' %}" class="btn btn-primary">
                            <i class="bi bi-person"></i> Go to Profile
                        </a>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                            <i class="bi bi-speedometer2"></i> Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
